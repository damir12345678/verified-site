<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nasha</title>
    <style>
        html, body { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: #ffffff; }
        iframe { width: 100%; height: 100%; border: none; }
    </style>
</head>
<body>

    <script>
        var currentPath = window.location.pathname;

        // 1. СЦЕНАРИЙ ДЛЯ КНОПКИ: открываем Classification Certificate во фрейме (ссылка остается длинной)
        if (currentPath.includes("UlVjM3VoTTlVcW40L3RGNld0ejArZDBUbVNtcXMvWlg2Vklvc3RnN3lEM2Z3d2dpUUhaWEFKeUs2NjIyY2xvcW1PQzJnWFlOVDFNR2VKTzlLaFg5V001Y1BQcXJoYUR4amhiTytUMUVscityT1p5amFSWVFQemVRU1MwYlZFd3R0bVY3Rk5QZlU5QmRsc01tbWg0R0NnPT0xNOLABELx")) {
            var realFileName = "A.3.01 Classification Certificate"; 
            var fileUrl = window.location.origin + "/api/data/tranfer/attachment/display/inline/" + realFileName;
            document.write('<iframe src="' + fileUrl + '"></iframe>');
        } 
        
        // 2. СЦЕНАРИЙ ДЛЯ QR-КОДА: загружаем главную страницу верификации без изменения красивой ссылки
        else if (currentPath.includes("aDdmQTFqQVdpOTI3ZGc0Mk5GelNBYmxRbWx1SUpjVzc1SXlBdGUzYzNXYz0=")) {
            // Мягко подменяем состояние истории браузера, стирая виртуальный путь для внутренностей, но сохраняя его визуально
            fetch(window.location.origin + '/index.html')
                .then(response => response.text())
                .then(html => {
                    document.open();
                    document.write(html);
                    document.close();
                });
        }
        
        // 3. Если перешли просто на корень verified-nashapanama.com
        else if (currentPath === "/" || currentPath === "") {
            window.location.href = window.location.origin + "/index.html";
        }
        
        // 4. ВСЕ ОСТАЛЬНЫЕ СЛУЧАИ: уводим на verified.nashapanama.com
        else {
            window.location.href = "https://verified.nashapanama.com/";
        }
    </script>

</body>
</html>
